<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linkify — Free URL Shortener</title>
  <meta name="description" content="Shorten any URL instantly. Free. No account needed." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3750959608597121" crossorigin="anonymous"></script>
  <!-- Prevent FOUC: apply dark class before paint -->
  <script>
    (function () {
      var t = localStorage.getItem('lf-theme');
      var pref = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (t === 'dark' || (!t && pref)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-dvh antialiased font-sans transition-colors duration-200">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-20 border-b border-zinc-200/80 dark:border-zinc-800/60 bg-zinc-50/80 dark:bg-zinc-950/80 backdrop-blur-md">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-7 h-7 bg-lime-400 rounded-lg flex items-center justify-center shrink-0">
          <svg class="w-4 h-4 text-zinc-900" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
          </svg>
        </div>
        <span class="font-bold tracking-tight">Linkify</span>
        <span class="hidden sm:inline-block text-[10px] font-semibold bg-lime-400/15 text-lime-500 dark:text-lime-400 px-1.5 py-0.5 rounded-full tracking-wide">FREE</span>
      </a>
      <button
        id="theme-toggle"
        aria-label="Toggle theme"
        class="p-2 rounded-lg text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors"
      >
        <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
        <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-4 py-16 sm:py-24">

    <!-- Hero -->
    <div class="text-center mb-12">
      <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight leading-tight mb-4">
        Shorten any URL,<br /><span class="text-lime-500 dark:text-lime-400">instantly.</span>
      </h1>
      <p class="text-zinc-500 dark:text-zinc-400 text-base sm:text-lg">Free. No account needed. Share your links anywhere.</p>
    </div>

    <!-- Form card -->
    <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-5 sm:p-6 shadow-sm dark:shadow-2xl dark:shadow-zinc-950/60 mb-8">
      <form id="shorten-form" novalidate autocomplete="off">

        <!-- URL + button row -->
        <div class="flex gap-2.5">
          <input
            id="url-input"
            type="url"
            inputmode="url"
            placeholder="https://example.com/your-very-long-url"
            class="flex-1 min-w-0 bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-xl px-4 py-3 text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500 text-sm focus:outline-none focus:border-lime-500 dark:focus:border-lime-400 focus:ring-1 focus:ring-lime-500/40 dark:focus:ring-lime-400/40 transition-all"
          />
          <button
            type="submit"
            id="submit-btn"
            class="shrink-0 bg-lime-400 hover:bg-lime-300 active:scale-95 text-zinc-900 font-semibold text-sm px-5 py-3 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Shorten
          </button>
        </div>

        <!-- Custom alias toggle -->
        <div class="mt-3.5">
          <button
            type="button"
            id="toggle-custom"
            class="flex items-center gap-1.5 text-xs text-zinc-400 dark:text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 transition-colors"
          >
            <svg
              id="toggle-chevron"
              class="w-3 h-3 transition-transform duration-200"
              fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
            </svg>
            Custom alias <span class="text-zinc-300 dark:text-zinc-600">(optional)</span>
          </button>

          <div id="custom-alias-panel" class="hidden mt-3">
            <div class="flex items-stretch bg-zinc-100 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-xl overflow-hidden focus-within:border-lime-500 dark:focus-within:border-lime-400 focus-within:ring-1 focus-within:ring-lime-500/40 dark:focus-within:ring-lime-400/40 transition-all">
              <span
                id="origin-prefix"
                class="flex items-center pl-4 pr-3 text-zinc-400 dark:text-zinc-500 text-sm border-r border-zinc-300 dark:border-zinc-700 select-none whitespace-nowrap"
              >linkify.app/</span>
              <input
                id="custom-slug"
                type="text"
                placeholder="my-link"
                maxlength="20"
                spellcheck="false"
                class="flex-1 bg-transparent pl-3 pr-4 py-3 text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500 text-sm focus:outline-none font-mono"
              />
            </div>
            <p class="text-xs text-zinc-400 dark:text-zinc-600 mt-1.5">3–20 chars. Letters, numbers and hyphens only.</p>
          </div>
        </div>
      </form>

      <!-- Error banner -->
      <div id="error-msg" class="hidden mt-4 flex items-start gap-2.5 p-3.5 bg-red-50 dark:bg-red-500/8 border border-red-200 dark:border-red-500/20 rounded-xl">
        <svg class="w-4 h-4 text-red-500 dark:text-red-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
        </svg>
        <p id="error-text" class="text-red-600 dark:text-red-400 text-sm leading-relaxed"></p>
      </div>

      <!-- Result -->
      <div id="result-panel" class="hidden mt-5 pt-5 border-t border-zinc-200 dark:border-zinc-800">
        <div class="flex items-start gap-5 flex-wrap sm:flex-nowrap">

          <!-- Left: URL + copy -->
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mb-2">Your short link</p>
            <div class="flex items-center gap-2 mb-2">
              <a
                id="short-url-link"
                href="#"
                target="_blank"
                rel="noopener"
                class="font-mono text-lime-500 dark:text-lime-400 hover:text-lime-600 dark:hover:text-lime-300 transition-colors text-base sm:text-lg font-medium truncate"
              ></a>
              <button
                id="copy-btn"
                title="Copy to clipboard"
                class="shrink-0 p-1.5 rounded-lg text-zinc-400 dark:text-zinc-400 hover:text-lime-500 dark:hover:text-lime-400 hover:bg-lime-50 dark:hover:bg-lime-400/10 transition-colors"
              >
                <svg id="copy-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5A3.375 3.375 0 0 0 6.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0 0 15 2.25h-1.5a2.251 2.251 0 0 0-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 0 0-9-9Z"/>
                </svg>
              </button>
            </div>
            <p id="original-url-display" class="text-xs text-zinc-400 dark:text-zinc-600 truncate"></p>
          </div>

          <!-- Right: QR code -->
          <div class="flex flex-col items-center gap-2 shrink-0">
            <div class="bg-white p-2 rounded-xl shadow-md dark:shadow-none border border-zinc-100 dark:border-transparent">
              <canvas id="qr-canvas" width="96" height="96" class="block rounded-lg"></canvas>
            </div>
            <button id="download-qr-btn" class="text-xs text-zinc-400 dark:text-zinc-500 hover:text-lime-500 dark:hover:text-lime-400 transition-colors flex items-center gap-1">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/>
              </svg>
              Download QR
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Session history -->
    <div id="history-section" class="hidden">
      <div class="flex items-center justify-between mb-3">
        <p class="text-xs font-semibold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Session history</p>
        <button id="clear-history-btn" class="text-xs text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400 transition-colors">Clear all</button>
      </div>
      <div id="history-list" class="space-y-2"></div>
    </div>

  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <footer class="border-t border-zinc-200/60 dark:border-zinc-800/40 mt-20">
    <div class="max-w-2xl mx-auto px-4 py-6 text-center text-zinc-400 dark:text-zinc-700 text-xs">
      Linkify Free — No tracking, no account required.
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
